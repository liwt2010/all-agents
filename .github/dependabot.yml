# Dependabot configuration for automated dependency updates.
#
# Strategy:
#   - pip ecosystem: group minor/patch updates to reduce PR noise
#   - github-actions: keep workflows up-to-date
#   - docker: rebuild base image regularly
#
# PR limits: each ecosystem opens max 5 PRs/week to avoid spam.
# Reviewer: maintainers must still review + merge manually.

version: 2

# -----------------------------------------------------------------------------
# Python (pip / requirements.txt + pyproject.toml)
# -----------------------------------------------------------------------------
- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
    timezone: "Asia/Shanghai"
  open-pull-requests-limit: 5
  # Group minor + patch updates into single PR to reduce noise
  groups:
    python-minor-and-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
    python-major:
      patterns:
        - "*"
      update-types:
        - "major"
  labels:
    - "dependencies"
    - "python"
  # Allow up to 20 compatible major bumps for fast-moving libs (e.g. fastapi)
  # Be conservative for security-critical deps
  ignore:
    # Don't auto-update these without review (security-sensitive):
    - dependency-name: "cryptography"
      update-types: ["version-update:semver-major"]
    - dependency-name: "pyjwt"
      update-types: ["version-update:semver-major"]
    - dependency-name: "anthropic"
      update-types: ["version-update:semver-major"]
    - dependency-name: "openai"
      update-types: ["version-update:semver-major"]
  commit-message:
    prefix: "deps"
    prefix-development: "deps(dev)"
    include: "scope"

# -----------------------------------------------------------------------------
# GitHub Actions
# -----------------------------------------------------------------------------
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
    timezone: "Asia/Shanghai"
  open-pull-requests-limit: 3
  labels:
    - "dependencies"
    - "github-actions"
  commit-message:
    prefix: "ci"
    include: "scope"

# -----------------------------------------------------------------------------
# Docker (root Dockerfile + web/Dockerfile)
# -----------------------------------------------------------------------------
- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
    timezone: "Asia/Shanghai"
  open-pull-requests-limit: 2
  labels:
    - "dependencies"
    - "docker"
  commit-message:
    prefix: "docker"
    include: "scope"
