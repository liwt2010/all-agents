name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Security audit (pip-audit): scan dependencies for known CVEs
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit
        # Fail build if any dependency has a known CVE
        # --strict: exit non-zero on any vulnerability
        # --vulnerability-service osv: use Google's OSV database (free, no auth)
        # --no-deps: only scan direct deps (not transitive) - faster, fewer false positives
        run: |
          echo "=== pip-audit (strict mode) ==="
          pip-audit --strict --vulnerability-service osv -r requirements.txt
        continue-on-error: false

  unit-tests:
    name: Unit tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Use pinned requirements.txt rather than `.[api,storage,dev]`
          # to avoid subtle dep-mismatch bugs (e.g. python-dotenv was used
          # in src/ but missing from pyproject deps until PR-fixed).
          pip install -r requirements.txt
          pip install -e . --no-deps
      - name: Collect (verify tests can be imported)
        env:
          PYTHONPATH: src
        run: |
          # Fail fast on ModuleNotFoundError or import errors so the
          # actual test run log is not polluted by ImportError noise.
          pytest tests/ --collect-only -q --ignore=tests/test_pipeline_e2e_real_llm.py \
            --ignore=tests/test_resolver_peer_real_llm.py \
            --ignore=tests/test_data_provenance.py
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          # Real-LLM tests skip themselves when no key is set
          # Production-readiness gate must always run
          pytest tests/ \
            -v --tb=long \
            -m 'not real_llm' \
            --ignore=tests/test_pipeline_e2e_real_llm.py \
            --ignore=tests/test_resolver_peer_real_llm.py \
            --ignore=tests/test_data_provenance.py
      - name: Production-readiness gate
        env:
          PYTHONPATH: src
        run: |
          # This gate verifies the codebase is production-grade:
          # docs exist, Dockerfile has healthcheck, .env.example is
          # complete, no TODO/FIXME in critical paths, no hardcoded keys.
          pytest tests/test_production_readiness.py -v
        continue-on-error: false

      - name: Lint + type-check (strict)
        # FIXED: Removed || true and continue-on-error: true
        # Phase 1: Strict ruff on core modules (E/F/W/B - correctness only)
        # Phase 2 (future): Add UP006/UP045 after batch fix via ruff check --fix
        # Phase 3 (future): Remove per-file-ignores and promote all rules
        env:
          PYTHONPATH: src
        run: |
          echo "=== ruff strict (core modules, E/F/W/B rules) ==="
          ruff check src/agent_system/core/ src/agent_system/memory/ src/agent_system/storage/ --select=E,F,W,B
          echo "=== ruff advisory (all modules, informational) ==="
          ruff check src/ tests/ --select=E,F,W,I,UP,B,C4,SIM
          echo "=== mypy strict (core modules) ==="
          mypy src/agent_system/core/ src/agent_system/memory/ src/agent_system/storage/
        continue-on-error: false

  real-llm-smoke:
    name: Real-LLM smoke (manual / weekly)
    runs-on: ubuntu-latest
    # Only run on main + manual dispatch. PRs dont have access to
    # the real API key (CI secret).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps
      - name: Run real-LLM pipeline smoke test
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: anthropic
        run: |
          # This test runs a full Product->Tech->Test pipeline against
          # a real LLM. If it fails, the model integration is broken.
          pytest tests/test_pipeline_e2e_real_llm.py::test_pipeline_step_by_step_real_llm -v -s
        continue-on-error: false
