name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,storage,dev]"
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: |
          # Real-LLM tests skip themselves when no key is set
          # Production-readiness gate must always run
          pytest tests/ \
            -v --tb=short \
            -m 'not real_llm' \
            --ignore=tests/test_pipeline_e2e_real_llm.py \
            --ignore=tests/test_resolver_peer_real_llm.py \
            --ignore=tests/test_data_provenance.py
      - name: Production-readiness gate
        env:
          PYTHONPATH: src
        run: |
          # This gate verifies the codebase is production-grade:
          # docs exist, Dockerfile has healthcheck, .env.example is
          # complete, no TODO/FIXME in critical paths, no hardcoded keys.
          pytest tests/test_production_readiness.py -v

  real-llm-smoke:
    name: Real-LLM smoke (manual / weekly)
    runs-on: ubuntu-latest
    # Only run on main + manual dispatch. PRs don't have access to
    # the real API key (CI secret).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,storage,dev]"
      - name: Run real-LLM pipeline smoke test
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: anthropic
        run: |
          # This test runs a full Product->Tech->Test pipeline against
          # a real LLM. If it fails, the model integration is broken.
          pytest tests/test_pipeline_e2e_real_llm.py::test_pipeline_step_by_step_real_llm -v -s
        continue-on-error: false
