version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AGENT_CONFIG_PATH=/app/src/agent_system/config/settings.yaml
      - PYTHONUNBUFFERED=1
    volumes:
      - agent_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: Postgres for production persistence
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: agent_system
  #     POSTGRES_USER: agent
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  # Optional: Redis for caching and pub/sub
  # redis:
  #   image: redis:7-alpine

volumes:
  agent_data:
